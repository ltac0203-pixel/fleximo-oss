  /api/tenant/kds/orders:
    get:
      tags: [tenant]
      summary: KDS 注文一覧取得
      description: |
        KDS（キッチンディスプレイ）用の注文一覧。ステータス・営業日・更新日時でフィルタ可能。
        `updated_since` を使った差分ポーリングをサポート。
        レート制限: 60 リクエスト/分。
      operationId: tenant.kds.orders.index
      parameters:
        - name: "statuses[]"
          in: query
          schema:
            type: array
            items:
              $ref: "#/components/schemas/OrderStatus"
          style: form
          explode: true
          description: フィルタするステータスの配列
        - name: business_date
          in: query
          schema:
            type: string
            format: date
            example: "2026-03-20"
          description: 営業日（Y-m-d 形式）
        - name: updated_since
          in: query
          schema:
            type: string
            format: date-time
            example: "2026-03-20T12:00:00+09:00"
          description: この日時以降に更新された注文のみ取得（差分ポーリング用）
      responses:
        "200":
          description: KDS 注文一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/KdsOrder"
                  meta:
                    type: object
                    properties:
                      server_time:
                        type: string
                        format: date-time
                        example: "2026-03-20T12:00:00+09:00"
