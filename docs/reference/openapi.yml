                menu_item_id:
                  type: integer
                  description: 商品 ID
                quantity:
                  type: integer
                  minimum: 1
                  maximum: 99
                  description: 数量
                option_ids:
                  type: array
                  items:
                    type: integer
                  description: オプション ID の配列
