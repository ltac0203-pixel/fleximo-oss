openapi: "3.1.0"

info:
  title: Fleximo API
  version: "1.0.0"
  description: |
    マルチテナント型モバイルオーダープラットフォーム **Fleximo** の REST API 仕様。

    ## 認証

    Laravel Sanctum SPAモード（Cookie/Session）を使用。

    ### フロー
    1. `GET /sanctum/csrf-cookie` にアクセスして `XSRF-TOKEN` Cookie を取得
    2. ログイン（`POST /login` または `POST /for-business/login`）
    3. 以降のリクエストには Cookie が自動付与され、`X-XSRF-TOKEN` ヘッダーに XSRF トークンを付与

    ## 冪等性（Idempotency-Key）

    決済関連エンドポイント（`checkout`, `payments/finalize`, `payments/3ds-callback`）には
    `Idempotency-Key` ヘッダー（UUIDv4 形式）が必須。30分間 TTL で冪等性を保証する。

    ### エラーコード

    | ステータス | メッセージ | 説明 |
    |---|---|---|
    | 422 | `Idempotency-Key header is required.` | ヘッダー未送信 |
    | 400 | `Idempotency-Key header is required.` | ヘッダーが空 |
    | 400 | `Idempotency-Key must be a UUIDv4 string.` | UUIDv4 形式でない |
    | 409 | `Idempotency key already used with a different request.` | 同一キーで異なるリクエスト |
    | 409 | `Request with this Idempotency-Key is currently being processed.` | 処理中の重複 |

    ## レスポンス形式

    `JsonResource::withoutWrapping()` が設定されており、単一リソースには `data` ラッパーは付かない。
    ページネーション付きコレクションには `data` 配列 + `meta` オブジェクトが含まれる。

servers:
  - url: https://fleximo.jp
    description: 本番環境
  - url: http://localhost
    description: ローカル開発環境

tags:
  - name: public
    description: 認証不要または全認証ユーザーが利用可能（ロール制限なし）
  - name: tenant
    description: テナント管理者（tenant_admin）・スタッフ（tenant_staff）向け
  - name: customer
    description: 顧客（customer）向け
  - name: webhooks
    description: 外部サービス（fincode）からの Webhook 受信

security:
  - cookieAuth: []

paths:

  # ============================================================
  # Public
  # ============================================================

  /api/health:
    get:
      tags: [public]
      summary: ヘルスチェック
      description: IP ホワイトリストで保護。認証不要。
      operationId: health.check
      security: []
      responses:
        "200":
          description: 正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/tenants:
    get:
      tags: [public]
      summary: テナント一覧検索
      description: キーワード・位置情報でテナントを検索する。認証済みユーザー（ロール不問）が利用可能。
      operationId: tenants.index
      parameters:
        - name: query
          in: query
          schema:
            type: string
            maxLength: 100
          description: 検索キーワード
        - name: lat
          in: query
          schema:
            type: number
            minimum: -90
            maximum: 90
          description: 緯度
        - name: lng
          in: query
          schema:
            type: number
            minimum: -180
            maximum: 180
          description: 経度
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
          description: ページサイズ
      responses:
        "200":
          description: テナント一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tenant"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "429":
          $ref: "#/components/responses/429TooManyRequests"

  /api/tenants/{tenant}:
    get:
      tags: [public]
      summary: テナント詳細取得
      description: slug でテナントを取得する。アクティブなテナントのみ返す。
      operationId: tenants.show
      parameters:
        - name: tenant
          in: path
          required: true
          schema:
            type: string
          description: テナントの slug
      responses:
        "200":
          description: テナント詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"

  /api/tenants/{tenant}/menu:
    get:
      tags: [public]
      summary: テナントメニュー取得
      description: テナントのカテゴリ＋商品一覧を返す。アクティブなテナントのみ。
      operationId: tenants.menu
      parameters:
        - name: tenant
          in: path
          required: true
          schema:
            type: string
          description: テナントの slug
      responses:
        "200":
          description: メニュー（カテゴリ＋商品のネスト構造）
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicMenuCategory"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "404":
          $ref: "#/components/responses/404NotFound"

  # ============================================================
  # Tenant
  # ============================================================

  /api/tenant/profile:
    get:
      tags: [tenant]
      summary: テナントプロフィール取得
      operationId: tenant.profile.show
      responses:
        "200":
          description: テナント詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantDetail"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
    patch:
      tags: [tenant]
      summary: テナントプロフィール更新
      description: テナント管理者（tenant_admin）のみ実行可能。
      operationId: tenant.profile.update
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                  description: 店舗名
                address:
                  type: string
                  maxLength: 500
                  description: 住所
                email:
                  type: string
                  format: email
                  maxLength: 255
                phone:
                  type: string
                  maxLength: 50
                business_hours:
                  type: array
                  items:
                    $ref: "#/components/schemas/BusinessHourInput"
      responses:
        "200":
          description: 更新後のテナント詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantDetail"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /api/tenant/staff:
    get:
      tags: [tenant]
      summary: スタッフ一覧取得
      description: テナント管理者のみ実行可能（StaffPolicy@viewAny）。
      operationId: tenant.staff.index
      responses:
        "200":
          description: スタッフ一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Staff"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
    post:
      tags: [tenant]
      summary: スタッフ作成
      description: テナント管理者のみ実行可能（StaffPolicy@create）。
      operationId: tenant.staff.store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
                - password_confirmation
              properties:
                name:
                  type: string
                  maxLength: 255
                email:
                  type: string
                  format: email
                  maxLength: 255
                password:
                  type: string
                  minLength: 8
                  writeOnly: true
                password_confirmation:
                  type: string
                  minLength: 8
                  writeOnly: true
                phone:
                  type: string
                  maxLength: 20
      responses:
        "201":
          description: 作成したスタッフ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /api/tenant/staff/{staff}:
    parameters:
      - name: staff
        in: path
        required: true
        schema:
          type: integer
        description: スタッフ ID
    get:
      tags: [tenant]
      summary: スタッフ詳細取得
      description: テナント管理者のみ実行可能（StaffPolicy@view）。
      operationId: tenant.staff.show
      responses:
        "200":
          description: スタッフ詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
    put:
      tags: [tenant]
      summary: スタッフ更新
      description: テナント管理者のみ実行可能（StaffPolicy@update）。
      operationId: tenant.staff.update
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                email:
                  type: string
                  format: email
                  maxLength: 255
                password:
                  type: string
                  minLength: 8
                  writeOnly: true
                password_confirmation:
                  type: string
                  minLength: 8
                  writeOnly: true
                phone:
                  type: string
                  maxLength: 20
                is_active:
                  type: boolean
      responses:
        "200":
          description: 更新後のスタッフ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
    delete:
      tags: [tenant]
      summary: スタッフ削除
      description: テナント管理者のみ実行可能（StaffPolicy@delete）。
      operationId: tenant.staff.destroy
      responses:
        "204":
          description: 削除済み
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /api/tenant/menu/categories:
    get:
      tags: [tenant]
      summary: カテゴリ一覧取得
      operationId: tenant.menu.categories.index
      responses:
        "200":
          description: カテゴリ一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuCategory"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
    post:
      tags: [tenant]
      summary: カテゴリ作成
      description: テナント管理者のみ実行可能（MenuCategoryPolicy@create）。
      operationId: tenant.menu.categories.store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  maxLength: 100
                sort_order:
                  type: integer
                  minimum: 0
                is_active:
                  type: boolean
                  default: true
      responses:
        "201":
          description: 作成したカテゴリ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuCategory"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /api/tenant/menu/categories/reorder:
    post:
      tags: [tenant]
      summary: カテゴリ並び替え
      description: テナント管理者のみ実行可能（MenuCategoryPolicy@reorder）。
      operationId: tenant.menu.categories.reorder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ordered_ids
              properties:
                ordered_ids:
                  type: array
                  description: 新しい並び順のカテゴリ ID 配列
                  items:
                    type: integer
      responses:
        "200":
          description: 並び替え完了
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "並び順を更新しました。"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /api/tenant/menu/categories/{category}:
    parameters:
      - name: category
        in: path
        required: true
        schema:
          type: integer
        description: カテゴリ ID
    get:
      tags: [tenant]
      summary: カテゴリ詳細取得
      operationId: tenant.menu.categories.show
      responses:
        "200":
          description: カテゴリ詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuCategory"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
    put:
      tags: [tenant]
      summary: カテゴリ更新
      description: テナント管理者のみ実行可能（MenuCategoryPolicy@update）。
      operationId: tenant.menu.categories.update
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 100
                sort_order:
                  type: integer
                  minimum: 0
                is_active:
                  type: boolean
      responses:
        "200":
          description: 更新後のカテゴリ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuCategory"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
    delete:
      tags: [tenant]
      summary: カテゴリ削除
      description: テナント管理者のみ実行可能（MenuCategoryPolicy@delete）。
      operationId: tenant.menu.categories.destroy
      responses:
        "204":
          description: 削除済み
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /api/tenant/menu/items:
    get:
      tags: [tenant]
      summary: 商品一覧取得
      operationId: tenant.menu.items.index
      responses:
        "200":
          description: 商品一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
    post:
      tags: [tenant]
      summary: 商品作成
      description: テナント管理者のみ実行可能（MenuItemPolicy@create）。
      operationId: tenant.menu.items.store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuItemInput"
      responses:
        "201":
          description: 作成した商品
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /api/tenant/menu/items/{item}:
    parameters:
      - name: item
        in: path
        required: true
        schema:
          type: integer
        description: 商品 ID
    get:
      tags: [tenant]
      summary: 商品詳細取得
      description: categories と optionGroups.options をロードして返す。
      operationId: tenant.menu.items.show
      responses:
        "200":
          description: 商品詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
    put:
      tags: [tenant]
      summary: 商品更新
      description: テナント管理者のみ実行可能（MenuItemPolicy@update）。全フィールド部分更新可能。
      operationId: tenant.menu.items.update
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuItemInput"
      responses:
        "200":
          description: 更新後の商品
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"
    delete:
      tags: [tenant]
      summary: 商品削除
      description: テナント管理者のみ実行可能（MenuItemPolicy@delete）。
      operationId: tenant.menu.items.destroy
      responses:
        "204":
          description: 削除済み
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /api/tenant/menu/items/{item}/sold-out:
    patch:
      tags: [tenant]
      summary: 売り切れ状態トグル
      description: |
        is_sold_out を切り替える。
        テナント管理者・スタッフ共に実行可能（MenuItemPolicy@toggleSoldOut）。
      operationId: tenant.menu.items.sold-out
      parameters:
        - name: item
          in: path
          required: true
          schema:
            type: integer
          description: 商品 ID
      responses:
        "200":
          description: 更新後の商品
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /api/tenant/menu/items/{item}/option-groups:
    post:
      tags: [tenant]
      summary: 商品へオプショングループを紐付け
      description: テナント管理者のみ実行可能（MenuItemPolicy@manageOptionGroups）。
      operationId: tenant.menu.items.option-groups.attach
      parameters:
        - name: item
          in: path
          required: true
          schema:
            type: integer
          description: 商品 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - option_group_id
              properties:
                option_group_id:
                  type: integer
                  description: 紐付けるオプショングループ ID
      responses:
        "200":
          description: 更新後の商品
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /api/tenant/menu/items/{item}/option-groups/{optionGroup}:
    delete:
      tags: [tenant]
      summary: 商品からオプショングループ紐付け解除
      description: テナント管理者のみ実行可能（MenuItemPolicy@manageOptionGroups）。
      operationId: tenant.menu.items.option-groups.detach
      parameters:
        - name: item
          in: path
          required: true
          schema:
            type: integer
          description: 商品 ID
        - name: optionGroup
          in: path
          required: true
          schema:
            type: integer
          description: オプショングループ ID
      responses:
        "200":
          description: 更新後の商品
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"

  /api/tenant/option-groups:
    get:
      tags: [tenant]
      summary: オプショングループ一覧取得
      operationId: tenant.option-groups.index
      responses:
        "200":
          description: オプショングループ一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OptionGroup"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
    post:
      tags: [tenant]
      summary: オプショングループ作成
      description: テナント管理者のみ実行可能（OptionGroupPolicy@create）。
      operationId: tenant.option-groups.store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  maxLength: 255
                required:
                  type: boolean
                  default: false
                  description: 必須選択か
                min_select:
                  type: integer
                  minimum: 0
                  default: 0
                max_select:
                  type: integer
                  minimum: 1
                  default: 1
                sort_order:
                  type: integer
                  minimum: 0
                is_active:
                  type: boolean
                  default: true
      responses:
        "201":
          description: 作成したオプショングループ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptionGroup"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "422":
          $ref: "#/components/responses/422UnprocessableEntity"

  /api/tenant/option-groups/{optionGroup}:
    parameters:
      - name: optionGroup
        in: path
        required: true
        schema:
          type: integer
        description: オプショングループ ID
    get:
      tags: [tenant]
      summary: オプショングループ詳細取得
      description: options をロードして返す。
      operationId: tenant.option-groups.show
      responses:
        "200":
          description: オプショングループ詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptionGroup"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
