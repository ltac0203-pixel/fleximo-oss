name: 🐛 バグ報告 / Bug report
description: 想定外の挙動・エラー・クラッシュなどを報告する / Report unexpected behavior, errors, or crashes
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Fleximo へのバグ報告ありがとうございます。再現性のある情報をいただけると修正がスムーズになります。

        > ⚠️ **セキュリティ脆弱性は公開 Issue で報告しないでください。**
        > [SECURITY.md](https://github.com/ltac0203-pixel/fleximo-oss/blob/main/SECURITY.md) の手順に従い、Security Advisory またはメールで報告してください。

  - type: checkboxes
    id: preflight
    attributes:
      label: 事前確認 / Preflight checklist
      description: 投稿前にご確認ください
      options:
        - label: 既存の Issue（Open / Closed 両方）を検索したが該当が見つからなかった
          required: true
        - label: このバグはセキュリティ脆弱性ではない（脆弱性は SECURITY.md の手順で報告）
          required: true
        - label: 最新の `main` または最新タグで再現することを確認した
          required: false

  - type: textarea
    id: summary
    attributes:
      label: 概要 / Summary
      description: 何が起きたかを 1〜3 行で
      placeholder: 例) テナント管理画面で商品を保存すると 500 エラーになる
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順 / Steps to reproduce
      description: 第三者が同じ状態を再現できる手順を順番に
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待する挙動 / Expected behavior
      placeholder: 何が起きるべきだったか
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 実際の挙動 / Actual behavior
      description: エラーメッセージ・スタックトレース・ログがあれば貼り付けてください（機密情報は伏字に）
      placeholder: |
        エラー内容、レスポンス、ログ抜粋など
    validations:
      required: true

  - type: dropdown
    id: role
    attributes:
      label: 影響を受けるロール / Affected role
      description: どのユーザーロールで発生しますか
      multiple: true
      options:
        - customer（顧客）
        - tenant_staff（テナントスタッフ）
        - tenant_admin（テナント管理者）
        - 全ロール / All
        - ロール非依存（インフラ・ビルド等）
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 関連エリア / Affected area
      multiple: true
      options:
        - 認証 / Auth
        - メニュー / Menu
        - カート・チェックアウト / Cart & Checkout
        - 注文 / Order
        - 決済（fincode）/ Payment
        - テナント管理 / Tenant admin
        - プリンター / Printer
        - 通知 / Notifications
        - インフラ・ビルド / Infra & build
        - その他 / Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Fleximo バージョン / Version
      description: タグ名またはコミット SHA
      placeholder: 例) v0.3.2 / a1b2c3d
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 環境 / Environment
      description: PHP / Node / DB / OS / ブラウザなど
      value: |
        - OS:
        - PHP:
        - Node:
        - DB (MariaDB/MySQL):
        - ブラウザ / Browser:
        - 実行環境: ローカル / Xserver / VPS / その他
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: ログ・スクリーンショット / Logs & screenshots
      description: |
        `storage/logs/laravel.log` の関連箇所、ブラウザコンソール、ネットワークタブのスクリーンショットなど。
        **個人情報・カード番号・APIキーは必ずマスクしてください。**
      placeholder: ここに貼り付け
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 補足 / Additional context
      description: 回避策、関連 Issue / PR、思い当たる原因など
    validations:
      required: false
