name: ✨ 機能要望 / Feature request
description: 新機能・改善の提案 / Propose a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        機能提案ありがとうございます。「何が／なぜ／誰のために」必要かを明確にしていただけると、採否判断がスムーズになります。

        ふんわりした相談・アイデアの壁打ちは [Discussions](https://github.com/ltac0203-pixel/fleximo-oss/discussions) のほうが向いている場合があります。

  - type: checkboxes
    id: preflight
    attributes:
      label: 事前確認 / Preflight checklist
      options:
        - label: 既存の Issue / Discussions に同等の提案がないことを確認した
          required: true
        - label: "`docs/` 配下に既存仕様や設計方針の記載がないことを確認した"
          required: false

  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題 / Problem
      description: 現状どのような不便・制約があるか。誰が困っているか
      placeholder: 例) テナント管理者がスタッフのシフトを CSV でしか取り込めず、運用負荷が高い
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提案する解決策 / Proposed solution
      description: どのような機能・UI・API があれば解決するか
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案 / Alternatives considered
      description: 他のアプローチや、それを採らなかった理由
    validations:
      required: false

  - type: dropdown
    id: role
    attributes:
      label: 対象ロール / Target role
      multiple: true
      options:
        - customer（顧客）
        - tenant_staff（テナントスタッフ）
        - tenant_admin（テナント管理者）
        - 開発者 / 自己ホスト運営者
        - ロール非依存
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 関連エリア / Affected area
      multiple: true
      options:
        - 認証 / Auth
        - メニュー / Menu
        - カート・チェックアウト / Cart & Checkout
        - 注文 / Order
        - 決済（fincode）/ Payment
        - テナント管理 / Tenant admin
        - プリンター / Printer
        - 通知 / Notifications
        - インフラ・ビルド / Infra & build
        - ドキュメント / Docs
        - その他 / Other
    validations:
      required: true

  - type: dropdown
    id: breaking
    attributes:
      label: 破壊的変更の可能性 / Breaking change?
      options:
        - いいえ / No
        - はい / Yes
        - 不明 / Unknown
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 補足 / Additional context
      description: モックアップ、参考リンク、ユースケースなど
    validations:
      required: false
