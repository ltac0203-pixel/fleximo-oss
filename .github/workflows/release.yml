name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="$(mktemp)"

          awk -v version="$VERSION" '
            BEGIN {
              start_marker = "## [" version "]"
              prefix_len = length(start_marker)
            }
            /^## \[/ {
              if (in_section) { exit }
              if (substr($0, 1, prefix_len) == start_marker) { in_section = 1; next }
            }
            in_section {
              if ($0 ~ /^\[[^]]+\]:[[:space:]]+https?:/) { next }
              print
            }
          ' CHANGELOG.md | awk '
            NF == 0 { blank++; next }
            {
              if (started && blank) { for (i = 0; i < blank; i++) print "" }
              blank = 0; started = 1
              print
            }
          ' > "$NOTES_FILE"

          if [ ! -s "$NOTES_FILE" ]; then
            echo "No changelog section found for version ${VERSION}." > "$NOTES_FILE"
            echo "Please update CHANGELOG.md and re-tag." >> "$NOTES_FILE"
          fi

          echo "notes_file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          NOTES_FILE="${{ steps.changelog.outputs.notes_file }}"

          PRERELEASE_FLAG=""
          if [[ "$TAG" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$NOTES_FILE" \
            $PRERELEASE_FLAG
