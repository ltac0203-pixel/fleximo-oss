name: Coverage Report

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  coverage:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: password
          MARIADB_DATABASE: fleximo_test
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json, pdo
          coverage: xdebug

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Install Composer Dependencies
        run: composer install --prefer-dist --no-progress

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Run Migrations
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: fleximo_test
          DB_USERNAME: root
          DB_PASSWORD: password
        run: php artisan migrate --force

      - name: Run Tests with Coverage
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: fleximo_test
          DB_USERNAME: root
          DB_PASSWORD: password
        run: |
          vendor/bin/phpunit --coverage-clover coverage.xml --coverage-html coverage/html --coverage-text

      - name: Write Coverage Summary
        run: |
          node -e "const fs=require('fs');const xml=fs.readFileSync('coverage.xml','utf8');const m=xml.match(/lines-covered=\"(\\d+)\" lines-valid=\"(\\d+)\"/);if(m){const covered=Number(m[1]);const total=Number(m[2]);const pct=((covered/total)*100).toFixed(2);fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `## Coverage Report\n\n**Line Coverage:** ${pct}% (${covered}/${total} lines)\n\n`);}"

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html-report
          path: coverage/html

      - name: Comment Coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.readFileSync('coverage.xml', 'utf8');
            const match = coverage.match(/lines-covered="(\d+)" lines-valid="(\d+)"/);
            if (match) {
              const covered = parseInt(match[1]);
              const total = parseInt(match[2]);
              const percentage = ((covered / total) * 100).toFixed(2);

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 📊 Backend Coverage Report\n\n**Line Coverage:** ${percentage}% (${covered}/${total} lines)\n\n[View detailed report in artifacts](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              });
            }
